# Shoplane theme — Shopify CLI environments
# Docs: https://shopify.dev/docs/storefronts/themes/tools/cli/environments
#
# Primary store theme (unpublished, not live):
#   Shoplane Editorial  #150850732102
# Live customers still see: shoplane #147628851270

[environments.default]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
theme_editor_sync = true
# Protect editor JSON during casual pushes / theme dev sync
ignore = [
  "templates/*.json",
  "config/settings_data.json",
  "sections/header-group.json",
  "sections/footer-group.json"
]

[environments.pull]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
only = [
  "templates/*.json",
  "config/settings_data.json",
  "sections/header-group.json",
  "sections/footer-group.json"
]

# Code-only push to store theme (skips JSON)
[environments.push]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
ignore = [
  "templates/*.json",
  "config/settings_data.json",
  "sections/header-group.json",
  "sections/footer-group.json"
]

[environments.push-templates]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
only = [
  "templates/page.services.json",
  "templates/page.about.json",
  "templates/page.contact.json",
  "templates/product.service.json",
  "templates/collection.services.json",
  "templates/collection.stores.json",
  "sections/stores-landing-hero.liquid",
  "sections/landing-inclusions.liquid",
  "sections/landing-reasons.liquid",
  "sections/services-landing-hero.liquid",
  "sections/services-category-group.liquid",
  "sections/services-category-hero.liquid",
  "sections/services-collection-grid.liquid",
  "sections/services-category-nav.liquid",
  "sections/services-how-it-works.liquid",
  "sections/services-trust-strip.liquid",
  "sections/collection-grid.liquid",
  "sections/cta-booking.liquid",
  "sections/page-hero.liquid",
  "sections/about-content.liquid",
  "sections/contact-form.liquid",
  "sections/faq-section.liquid",
  "sections/service-hero.liquid",
  "sections/service-overview.liquid",
  "sections/service-includes.liquid",
  "sections/service-why.liquid",
  "sections/service-benefits.liquid",
  "snippets/service-card.liquid",
  "snippets/product-card.liquid",
  "assets/theme.css"
]

[environments.push-homepage]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
only = [
  "templates/index.json",
  "templates/404.json",
  "templates/collection.json",
  "templates/product.json",
  "config/settings_data.json",
  "sections/header-group.json"
]

[environments.push-footer]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
only = [
  "sections/footer.liquid",
  "sections/footer-group.json"
]

# Full push to store theme (all files, including JSON)
[environments.push-full]
store = "qkvpb9-70.myshopify.com"
theme = "150850732102"
